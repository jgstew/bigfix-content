---
name: ParseRelaysDotDatInteractive

on:
  workflow_dispatch:
    # you cannot upload files directly via workflow_dispatch
    # so we use an interactive step to upload the file

jobs:
  ParseRelaysDotDatInteractive:
    runs-on: ubuntu-latest
    steps:
      - name: Interactive File Upload Step
        id: interactive-inputs
        # NOTE: this requires linux:
        uses: boasihq/interactive-inputs@v2
        with:
          ngrok-authtoken: ${{ secrets.NGROK_AUTHTOKEN }}
          interactive: |
            fields:
              - label: uploaded-file
                properties:
                  display: Upload Relays.dat file to parse
                  type: file
                  required: true
                  description: Select a Relays.dat file to be uploaded to the runner for processing
                  acceptedFileTypes: [.dat]

      # http://software.bigfix.com/download/bes/util/ParseRelaysDotDat.exe
      - name: Download ParseRelaysDotDat.exe
        shell: bash
        run: |
            curl -O https://bigfix-wiki.hcltechsw.com/wikis/form/anonymous/api/wiki/9800bed4-8101-452b-930b-807aed3eb996/page/e2ee048f-bc56-4798-ba0b-e57c08a23160/attachment/71245215-dbd5-4f4a-b926-14afdd9d8f3c/media/ParseRelaysDotDat.exe
            ls
            if [[ "$(shasum -a 256 ParseRelaysDotDat.exe)" == *"dc80ce17015cca3cc477c7ff53d334c6d8a9d0e915ffa255a1b178afb383631b"* ]] ; then
              echo 'Integrity Check Passed'
            else
              echo 'Integrity Check Failed'
              exit 1
            fi

      - name: List the uploaded files in the directory
        shell: bash
        run: |
          echo "Display uploaded files"
          echo -e "\n==============================\n"
          ls -la ${{ steps.interactive-inputs.outputs.uploaded-file }} # Use the label of the multifile/file field as the key to get the uploaded file directory
          echo -e "\n==============================\n"

      - name: Install Wine
        run: |
          sudo dpkg --add-architecture i386
          wget -qO - https://dl.winehq.org/wine-builds/winehq.key | sudo apt-key add -
          # The following lines set up the repository for the Ubuntu version
          # Ensure you use the correct release name (e.g., jammy for Ubuntu 22.04)
          . /etc/os-release
          sudo add-apt-repository "deb https://dl.winehq.org/wine-builds/ubuntu $UBUNTU_CODENAME main"
          sudo apt update
          sudo apt install --install-recommends winehq-stable

      # will need to upload artifact and run in a different job or use Wine.
      - name: Run ParseRelaysDotDat
        run: wine ./ParseRelaysDotDat.exe ${{ steps.interactive-inputs.outputs.uploaded-file }}/Relays.dat
